<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArgBlazer Playground</title>
    <meta name="description" content="Try ArgBlazer in your browser: edit YAML argumentation frameworks and see interactive visualizations instantly.">
    <link rel="icon" type="image/png" sizes="32x32" href="media/favicon-32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700;800&display=swap");
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; font-family: "Space Grotesk", sans-serif; background: #fff; color: #0b0b11; }
        a { color: inherit; text-decoration: none; }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; border-bottom: 1px solid #e0e0e0;
            background: #fff; height: 52px;
        }
        .logo {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: "JetBrains Mono", monospace; letter-spacing: 0.08em;
            text-transform: uppercase; font-size: 0.8rem;
        }
        .logo img { height: 30px; width: auto; }
        .nav { display: flex; align-items: center; gap: 16px; font-weight: 600; font-size: 0.85rem; }
        .pill {
            background: #0b0b11; color: #f8f4ee; border: none; padding: 7px 14px;
            border-radius: 999px; font-family: inherit; font-weight: 800; font-size: 0.8rem;
            line-height: 1; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .pill:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }

        #workspace { display: flex; height: calc(100vh - 52px); }

        #editor-panel {
            display: flex; flex-direction: column; width: 30%; min-width: 220px; background: #fff;
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px; background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0; height: 36px; flex-shrink: 0;
        }
        .panel-label {
            font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
            color: #8a8a95; font-weight: 600; font-family: "JetBrains Mono", monospace;
            display: flex; align-items: center; gap: 6px;
        }
        .panel-label::before {
            content: ""; width: 8px; height: 8px; border-radius: 2px; background: #ffc857;
        }
        #example-select {
            font-family: "JetBrains Mono", monospace; font-size: 0.75rem;
            padding: 3px 8px; border: 1px solid rgba(0,0,0,0.12); border-radius: 6px;
            background: #f5f5f5; cursor: pointer; color: #333;
        }
        #editor-container { flex: 1; overflow: hidden; }

        #divider {
            width: 5px; background: #e0e0e0; cursor: col-resize;
            flex-shrink: 0; transition: background 0.15s;
        }
        #divider:hover, #divider.active { background: #aaa; }

        #preview-panel {
            flex: 1; min-width: 402px; display: flex; flex-direction: column; background: #fff;
        }
        #error-bar {
            padding: 10px 16px; background: #fff3f3; color: #c0392b;
            font-family: "JetBrains Mono", monospace; font-size: 0.8rem;
            border-bottom: 1px solid #f5c6cb; white-space: pre-wrap;
        }
        #preview-frame { flex: 1; border: none; width: 100%; height: 100%; }

        .panel-btn {
            font-family: "JetBrains Mono", monospace; font-size: 0.7rem; font-weight: 600;
            padding: 3px 10px; border-radius: 6px; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.12); transition: all 0.15s; line-height: 1.4;
            flex-shrink: 0;
        }
        .run-btn { background: #28a745; color: #fff; border-color: #1e7e34; }
        .run-btn:hover { background: #1e7e34; }
        .share-btn { background: #f5f5f5; color: #333; }
        .share-btn:hover { background: #e5e5e5; }

        .CodeMirror {
            height: 100%; font-family: 'JetBrains Mono', monospace !important; font-size: 14px;
            background: #fff;
        }
        .CodeMirror-gutters { background: #f5f5f5; border-right: 1px solid #e0e0e0; }

        #tab-bar {
            display: none; height: 38px; background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; border: none; background: transparent; cursor: pointer;
            font-family: "JetBrains Mono", monospace; font-size: 0.75rem; font-weight: 600;
            color: #8a8a95; transition: color 0.15s, border-bottom 0.15s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active { color: #0b0b11; border-bottom: 2px solid #0b0b11; }

        @media (max-width: 768px) {
            #tab-bar { display: flex; }
            #workspace { flex-direction: column; height: calc(100vh - 52px - 38px); }
            #editor-panel { width: 100% !important; height: 100%; min-width: unset; display: none; }
            #editor-panel.mobile-active { display: flex; }
            #divider { display: none; }
            #preview-panel { min-width: unset; height: 100%; flex: 1; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="index.html" class="logo">
            <img src="media/icon.png" alt="ArgBlazer icon">
            <span>ArgBlazer</span>
        </a>
        <nav class="nav">
            <a href="https://github.com/xai-ca/argblazer">GitHub</a>
            <button class="pill" id="installBtn">Install</button>
        </nav>
    </header>

    <div id="tab-bar">
        <button id="tab-yaml" class="tab-btn" onclick="switchTab('yaml')">YAML</button>
        <button id="tab-preview" class="tab-btn active" onclick="switchTab('preview')">Preview</button>
    </div>
    <div id="workspace">
        <div id="editor-panel">
            <div class="panel-header">
                <span class="panel-label">YAML</span>
                <div style="display:flex;align-items:center;gap:6px;">
                    <select id="example-select">
                        <option value="friedchicken_step">Fried Chicken (step)</option>
                        <option value="friedchicken_sets">Fried Chicken (sets)</option>
                        <option value="tweety">Tweety Bird</option>
                        <option value="steps">Step-by-step</option>
                        <option value="topbottom">Top / Bottom</option>
                    </select>
                    <button id="runBtn" class="panel-btn run-btn" title="Run visualization (Ctrl+S / ⌘S)">&#9654; Run</button>
                    <button id="shareBtn" class="panel-btn share-btn" title="Copy share link to clipboard">Share</button>
                </div>
            </div>
            <div id="editor-container"></div>
        </div>
        <div id="divider"></div>
        <div id="preview-panel">
            <div id="error-bar" style="display: none;"></div>
            <iframe id="preview-frame"></iframe>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script>
    // =====================================================================
    //  Example YAML content
    // =====================================================================
    var EXAMPLES = {
        friedchicken_step: 'arguments:\n  dine-in:\n    summary: Order dine-in fried chicken\n    step: 1\n  to-go:\n    summary: Order to-go fried chicken\n    step: 1\n  soggy:\n    summary: To-go chicken will be soggy\n    details:\n      rule: Food transported in a box loses crispiness due to trapped steam\n      evidence: Fried chicken taken to go is transported in a box\n      conclusion: To-go chicken will be soggy\n    step: 2\n  fryer:\n    summary: An air fryer at home can make fried chicken crispy\n    details:\n      rule: An air fryer restores crispiness by circulating hot air\n      evidence: There is an air fryer at home\n      conclusion: An air fryer at home can make fried chicken crispy again\n    step: 3\nattacks:\n  to-go: [dine-in]\n  dine-in: [to-go]\n  soggy: [to-go]\n  fryer: [soggy]\ndecisions:\n  Can we get fried chicken to go?:\n    criterion: to-go\n    quantifier: at least one\n    semantics: preferred\n  Must we get fried chicken to go?:\n    criterion: to-go\n    quantifier: all\n    semantics: preferred',

        friedchicken_sets: 'arguments:\n  dine-in:\n    summary: Order dine-in fried chicken\n    sets:\n      - apt 1\n      - apt 2\n  to-go:\n    summary: Order to-go fried chicken\n    sets:\n      - apt 1\n      - apt 2\n  soggy:\n    summary: To-go chicken will be soggy\n    details:\n      rule: Food transported in a box loses crispiness due to trapped steam\n      evidence: Fried chicken taken to go is transported in a box\n      conclusion: To-go chicken will be soggy\n    sets:\n      - apt 1\n      - apt 2\n  fryer:\n    summary: An air fryer at home can make fried chicken crispy\n    details:\n      rule: An air fryer restores crispiness by circulating hot air\n      evidence: There is an air fryer at home\n      conclusion: An air fryer at home can make fried chicken crispy again\n    sets:\n      - apt 2\nattacks:\n  to-go: [dine-in]\n  dine-in: [to-go]\n  soggy: [to-go]\n  fryer: [soggy]\ndecisions:\n  Can we get fried chicken to go?:\n    criterion: to-go\n    quantifier: at least one\n    semantics: preferred\n  Must we get fried chicken to go?:\n    criterion: to-go\n    quantifier: all\n    semantics: preferred',

        tweety: 'exhibit: |\n  Tweety is a bird.\n  Tweety is a penguin.\narguments:\n  a:\n    summary: Tweety can fly because birds typically can fly\n    details:\n      rule: Birds typically can fly\n      evidence: Tweety is a bird\n      conclusion: Tweety can fly\n  b:\n    summary: Tweety cannot fly because it is a penguin\n    details:\n      rule: Penguins cannot fly\n      evidence: Tweety is a penguin\n      conclusion: Tweety cannot fly\nattacks:\n  b: a',

        steps: 'arguments:\n  a:\n    step: 1\n  b:\n    step: 1\n  c:\n    step: 2\n  d:\n    step: 3\nattacks:\n  b: a\n  c: b\n  d: c',

        topbottom: 'arguments:\n  a:\n    anchor: top\n  b:\n  c:\n  d:\n    anchor: bottom\n  e:\n    anchor: bottom\nattacks:\n  b: a\n  c: b\n  d: c\n  e: b'
    };

    // =====================================================================
    //  Computation engine (ported from TypeScript)
    // =====================================================================

    // --- bfs.ts ---
    function buildUndirectedGraph(edges) {
        var graph = new Map();
        for (var i = 0; i < edges.length; i++) {
            var u = edges[i][0], v = edges[i][1];
            if (!graph.has(u)) graph.set(u, new Set());
            if (!graph.has(v)) graph.set(v, new Set());
            graph.get(u).add(v);
            graph.get(v).add(u);
        }
        return graph;
    }

    function singleSourceShortestPathLength(graph, source) {
        if (!graph.has(source)) return new Map();
        var distances = new Map();
        distances.set(source, 0);
        var queue = [source];
        while (queue.length > 0) {
            var node = queue.shift();
            var dist = distances.get(node);
            var neighbors = graph.get(node) || [];
            for (var nb of neighbors) {
                if (!distances.has(nb)) {
                    distances.set(nb, dist + 1);
                    queue.push(nb);
                }
            }
        }
        return distances;
    }

    function computeRank(edges, roots, first, last, isTop) {
        var effectiveRoots = roots.slice();
        if (effectiveRoots.length === 0) {
            if (isTop && first) effectiveRoots = [first];
            else if (!isTop && last) effectiveRoots = [last];
            else return {};
        }
        var graph = buildUndirectedGraph(edges);
        if (effectiveRoots.length === 1) {
            var source = effectiveRoots[0];
            if (!graph.has(source)) return {};
            var distances = singleSourceShortestPathLength(graph, source);
            var result = {};
            distances.forEach(function(v, k) { result[k] = v; });
            return result;
        }
        var rank = {};
        for (var ri = 0; ri < effectiveRoots.length; ri++) rank[effectiveRoots[ri]] = 0;
        for (var ri = 0; ri < effectiveRoots.length; ri++) {
            var root = effectiveRoots[ri];
            if (!graph.has(root)) continue;
            var distances = singleSourceShortestPathLength(graph, root);
            distances.forEach(function(v, k) {
                if (rank[k] === undefined) rank[k] = v;
                else rank[k] = Math.min(rank[k], v);
            });
        }
        return rank;
    }

    // --- argumentation.ts ---
    function isConflictFree(subset, attacks) {
        for (const [a, b] of attacks) {
            if (subset.has(a) && subset.has(b)) return false;
        }
        return true;
    }

    function isDefended(arg, subset, attacks) {
        for (const [attacker, target] of attacks) {
            if (target === arg) {
                let defended = false;
                for (const [z, t] of attacks) {
                    if (t === attacker && subset.has(z)) { defended = true; break; }
                }
                if (!defended) return false;
            }
        }
        return true;
    }

    function isAdmissible(subset, attacks) {
        if (!isConflictFree(subset, attacks)) return false;
        for (const x of subset) {
            if (!isDefended(x, subset, attacks)) return false;
        }
        return true;
    }

    function isComplete(subset, args, attacks) {
        if (!isAdmissible(subset, attacks)) return false;
        for (const x of args) {
            if (subset.has(x)) continue;
            if (isDefended(x, subset, attacks)) return false;
        }
        return true;
    }

    function isStable(subset, args, attacks) {
        if (!isConflictFree(subset, attacks)) return false;
        for (const x of args) {
            if (subset.has(x)) continue;
            let attacked = false;
            for (const [a, b] of attacks) {
                if (b === x && subset.has(a)) { attacked = true; break; }
            }
            if (!attacked) return false;
        }
        return true;
    }

    function isProperSuperset(a, b) {
        if (a.size <= b.size) return false;
        for (const x of b) {
            if (!a.has(x)) return false;
        }
        return true;
    }

    function computeGrounded(args, attacks) {
        const inSet = new Set();
        const outSet = new Set();
        let changed = true;
        while (changed) {
            changed = false;
            for (const x of args) {
                if (inSet.has(x) || outSet.has(x)) continue;
                const attackers = [];
                for (const [a, b] of attacks) {
                    if (b === x) attackers.push(a);
                }
                if (attackers.every(function(y) { return outSet.has(y); })) {
                    inSet.add(x);
                    changed = true;
                }
            }
            for (const [a, b] of attacks) {
                if (inSet.has(a) && !outSet.has(b)) {
                    outSet.add(b);
                    changed = true;
                }
            }
        }
        return inSet;
    }

    function extractConflictFreeSets(args, attacks) {
        const n = args.length;
        const argIndex = {};
        for (let i = 0; i < n; i++) argIndex[args[i]] = i;
        const conflictMask = [];
        for (let i = 0; i < n; i++) conflictMask.push(0n);
        for (const [a, b] of attacks) {
            const ai = argIndex[a];
            const bi = argIndex[b];
            conflictMask[ai] |= (1n << BigInt(bi));
            conflictMask[bi] |= (1n << BigInt(ai));
        }
        const result = [];
        const current = new Set();
        function backtrack(index, blocked) {
            result.push(new Set(current));
            for (let i = index; i < n; i++) {
                const bit = 1n << BigInt(i);
                if (blocked & bit) continue;
                if (conflictMask[i] & bit) continue;
                current.add(args[i]);
                backtrack(i + 1, blocked | conflictMask[i]);
                current.delete(args[i]);
            }
        }
        backtrack(0, 0n);
        return result;
    }

    function computeExtensions(args, attacks) {
        const argOrder = {};
        args.forEach(function(a, i) { argOrder[a] = i; });
        function setToOrderedArray(s) { return Array.from(s).sort(function(a, b) { return argOrder[a] - argOrder[b]; }); }

        const conflictFree = extractConflictFreeSets(args, attacks);
        const admissible = conflictFree.filter(function(s) { return isAdmissible(s, attacks); });
        const complete = admissible.filter(function(s) { return isComplete(s, args, attacks); });
        const preferred = admissible.filter(function(ext) {
            return !admissible.some(function(other) { return other !== ext && isProperSuperset(other, ext); });
        });
        const grounded = computeGrounded(args, attacks);
        const stable = conflictFree.filter(function(s) { return isStable(s, args, attacks); });
        return {
            conflict_free: conflictFree.map(setToOrderedArray),
            admissible: admissible.map(setToOrderedArray),
            complete: complete.map(setToOrderedArray),
            preferred: preferred.map(setToOrderedArray),
            grounded: [setToOrderedArray(grounded)],
            stable: stable.map(setToOrderedArray)
        };
    }

    // --- validator.ts ---
    var VALID_ANCHORS = ['top', 'bottom'];
    var VALID_QUANTIFIERS = ['all', 'at least one', 'none'];
    var VALID_SEMANTICS = ['preferred', 'grounded', 'complete', 'stable', 'conflict_free', 'admissible'];

    function validateYaml(yamlData) {
        if (!yamlData?.arguments || typeof yamlData.arguments !== 'object' || Array.isArray(yamlData.arguments) || Object.keys(yamlData.arguments).length === 0)
            return 'The "arguments" field must be a non-empty mapping.';
        var argIds = new Set();
        var argEntries = Object.entries(yamlData.arguments);
        for (var i = 0; i < argEntries.length; i++) {
            var id = argEntries[i][0];
            argIds.add(id);
            var arg = argEntries[i][1] != null ? argEntries[i][1] : {};
            if (arg.anchor !== undefined && VALID_ANCHORS.indexOf(arg.anchor) === -1)
                return 'Argument "' + id + '" has invalid anchor "' + arg.anchor + '" (must be "top" or "bottom").';
            if (arg.step !== undefined && typeof arg.step !== 'number')
                return 'Argument "' + id + '" has invalid step "' + arg.step + '" (must be a number).';
        }
        var attacksField = yamlData.attacks;
        if (attacksField !== undefined) {
            if (typeof attacksField !== 'object' || Array.isArray(attacksField))
                return 'The "attacks" field must be a mapping.';
            var attackEntries = Object.entries(attacksField);
            for (var j = 0; j < attackEntries.length; j++) {
                var attacker = attackEntries[j][0];
                var targets = attackEntries[j][1];
                if (!argIds.has(attacker)) return 'Unknown argument "' + attacker + '" in attacks.';
                var targetList = Array.isArray(targets) ? targets : [targets];
                for (var ti = 0; ti < targetList.length; ti++) {
                    if (!argIds.has(String(targetList[ti]))) return 'Unknown argument "' + targetList[ti] + '" in attacks.';
                }
            }
        }
        var decisions = yamlData.decisions || {};
        var decKeys = Object.keys(decisions);
        for (var d = 0; d < decKeys.length; d++) {
            var question = decKeys[d];
            var dec = decisions[question] || {};
            if (dec.criterion !== undefined && !argIds.has(String(dec.criterion)))
                return 'Decision "' + question + '" has unknown criterion "' + dec.criterion + '".';
            if (dec.quantifier !== undefined && VALID_QUANTIFIERS.indexOf(dec.quantifier) === -1)
                return 'Decision "' + question + '" has invalid quantifier "' + dec.quantifier + '" (must be one of: ' + VALID_QUANTIFIERS.join(', ') + ').';
            if (dec.semantics !== undefined && VALID_SEMANTICS.indexOf(dec.semantics) === -1)
                return 'Decision "' + question + '" has invalid semantics "' + dec.semantics + '" (must be one of: ' + VALID_SEMANTICS.join(', ') + ').';
        }
        return null;
    }

    // --- preprocessor.ts ---
    function preprocessAndCompute(yamlData) {
        var jsonData = JSON.parse(JSON.stringify(yamlData));

        // Normalize arguments map: { [id]: { summary?, step?, anchor?, sets?, details? } }
        var argsMap = {};
        for (const [k, v] of Object.entries(jsonData.arguments)) {
            argsMap[k] = v != null ? v : {};
        }
        jsonData.arguments = argsMap;

        var argEntries = Object.entries(jsonData.arguments);
        var first = argEntries.length > 0 ? argEntries[0][0] : null;
        var last = argEntries.length > 0 ? argEntries[argEntries.length - 1][0] : null;
        var hasStep = argEntries.some(function(e) { return e[1] && e[1].step !== undefined; });
        var top = [];
        var bottom = [];

        for (var ei = 0; ei < argEntries.length; ei++) {
            var k = argEntries[ei][0];
            var v = argEntries[ei][1];
            if (v && v.anchor === 'top') top.push(k);
            else if (v && v.anchor === 'bottom') bottom.push(k);
        }

        var prevStep = 0;
        var step2args = new Map();

        for (var ei = 0; ei < argEntries.length; ei++) {
            var k = argEntries[ei][0];
            var v = argEntries[ei][1];
            if (hasStep) {
                if (v && v.step !== undefined) prevStep = v.step;
            } else {
                v.step = ++prevStep;
            }
            var existing = step2args.get(prevStep) || [];
            existing.push(k);
            step2args.set(prevStep, existing);
        }

        var step2edges = new Map();
        var step2extFacts = new Map();

        (function() {
            var prevArgs = [];
            var sortedSteps = Array.from(step2args.keys()).sort(function(a, b) { return a - b; });
            for (var si = 0; si < sortedSteps.length; si++) {
                var step = sortedSteps[si];
                var argsInStep = step2args.get(step) || [];
                prevArgs = prevArgs.concat(argsInStep);
                var af = { args: [], attacks: [] };
                for (var ai = 0; ai < prevArgs.length; ai++) {
                    if (!af.args.includes(prevArgs[ai])) af.args.push(prevArgs[ai]);
                }
                step2extFacts.set(step, af);
            }
        })();

        if (jsonData.attacks && !Array.isArray(jsonData.attacks)) {
            var normalizedPairs = [];
            var attackMapEntries = Object.entries(jsonData.attacks);
            for (var ami = 0; ami < attackMapEntries.length; ami++) {
                var mapAttacker = attackMapEntries[ami][0];
                var mapTargets = attackMapEntries[ami][1];
                var mapTargetList = Array.isArray(mapTargets) ? mapTargets : [mapTargets];
                for (var mti = 0; mti < mapTargetList.length; mti++) {
                    normalizedPairs.push([mapAttacker, String(mapTargetList[mti])]);
                }
            }
            jsonData.attacks = normalizedPairs;
        }

        if (jsonData.attacks) {
            var sortedSteps = Array.from(step2args.keys()).sort(function(a, b) { return a - b; });
            for (var ati = 0; ati < jsonData.attacks.length; ati++) {
                var attack = jsonData.attacks[ati];
                var prevArgs = [];
                for (var si = 0; si < sortedSteps.length; si++) {
                    var step = sortedSteps[si];
                    var argsInStep = step2args.get(step) || [];
                    var attacker = attack[0];
                    var attackee = attack[1];
                    var allAvailable = argsInStep.concat(prevArgs);
                    if (allAvailable.includes(attacker) && allAvailable.includes(attackee)) {
                        var edges = step2edges.get(step) || [];
                        edges.push([attacker, attackee]);
                        step2edges.set(step, edges);
                        var af = step2extFacts.get(step);
                        af.attacks.push([attacker, attackee]);
                    }
                    prevArgs = prevArgs.concat(argsInStep);
                }
            }
        }

        var rankTopArr = [];
        var rankBottomArr = [];
        var sortedSteps = Array.from(step2extFacts.keys()).sort(function(a, b) { return a - b; });

        for (var si = 0; si < sortedSteps.length; si++) {
            var step = sortedSteps[si];
            var edges = step2edges.get(step) || [];
            rankTopArr.push(computeRank(edges, top, first, last, true));
            rankBottomArr.push(computeRank(edges, bottom, first, last, false));
        }

        jsonData.steps = { rank_top: rankTopArr, rank_bottom: rankBottomArr };
        return jsonData;
    }

    // --- extractRawExhibit ---
    function extractRawExhibit(yamlContent) {
        var lines = yamlContent.split('\n');
        var foundExhibit = false;
        var contentLines = [];

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (!foundExhibit) {
                var match = line.match(/^exhibit\s*:\s*(.*)/);
                if (match) {
                    foundExhibit = true;
                    var rest = match[1].trim();
                    if (rest === '|' || rest === '>' || rest === '|-' || rest === '>-') continue;
                    else if (rest && !rest.startsWith('#')) return rest;
                    continue;
                }
            } else {
                if (line.trim() !== '' && /^\S/.test(line)) break;
                contentLines.push(line);
            }
        }

        if (!foundExhibit || contentLines.length === 0) return null;
        var nonEmptyLines = contentLines.filter(function(l) { return l.trim() !== ''; });
        if (nonEmptyLines.length === 0) return null;

        var minIndent = Math.min.apply(null, nonEmptyLines.map(function(l) {
            var m = l.match(/^(\s*)/);
            return m ? m[1].length : 0;
        }));
        var trimmed = contentLines.map(function(l) { return l.length >= minIndent ? l.substring(minIndent) : l; });
        while (trimmed.length > 0 && trimmed[trimmed.length - 1].trim() === '') trimmed.pop();
        return trimmed.length > 0 ? trimmed.join('\n') : null;
    }

    function getFilteredArguments(stepIndex) {
        if (!argumentationData.arguments) return [];

        var allArgs = Object.keys(argumentationData.arguments).map(function(k) {
            var o = {}; o[k] = argumentationData.arguments[k]; return o;

        if (stepIndex > maxStepIndex) {

        } else {
            var currentActualStep = actualSteps[stepIndex];
            filtered = allArgs.filter(function(arg) {

    function getNewArgumentsForStep(stepIndex) {
        if (!argumentationData.arguments) return [];

        if (stepIndex > maxStepIndex) {
            return [];
        }

        var currentActualStep = actualSteps[stepIndex];

        return Object.keys(argumentationData.arguments).map(function(k) {
            var o = {}; o[k] = argumentationData.arguments[k]; return o;
        }).filter(function(arg) {
            return Object.values(arg)[0].step === currentActualStep;
        });

    function getFilteredAttacks(stepIndex) {
        if (!argumentationData.attacks) return [];

        var visibleArgIds = new Set();
        getFilteredArguments(stepIndex).forEach(function(arg) {
            visibleArgIds.add(Object.keys(arg)[0]);
        });

        return argumentationData.attacks.filter(function(attack) {

    function generateSubgraphs(stepIndex) {
        var rankDirection = getFileSpecificStorage('sessionRankDirection', document.getElementById('rank-direction').value);
        document.getElementById('rank-direction').value = rankDirection;
        var effectiveStepIndex = Math.max(0, Math.min(stepIndex, maxStepIndex));
        var rankArr = argumentationData.steps ? (rankDirection === 'top' ? argumentationData.steps.rank_top : argumentationData.steps.rank_bottom) : null;
        var rankData = rankArr ? rankArr[effectiveStepIndex] : null;
        if (!rankData) return '';

        var filteredArguments = getFilteredArguments(stepIndex);
        var visibleArgIds = new Set(filteredArguments.map(function(arg) { return Object.keys(arg)[0]; }));

        var rankGroups = {};
        Object.entries(rankData).forEach(function(entry) {
            var argId = entry[0], rank = entry[1];
            if (visibleArgIds.has(argId)) {
                if (!rankGroups[rank]) {
                    rankGroups[rank] = [];
                }
                rankGroups[rank].push(argId);
            }
        });

        var sortedRanks = Object.keys(rankGroups).map(Number).sort(function(a, b) {
            return rankDirection === 'top' ? b - a : a - b;
        });

        var subgraphString = '';
        var subgraphIds = [];

        sortedRanks.forEach(function(rank) {
            var rankLabel = rank + 1;
            var subgraphId = 'r' + rankLabel;
            subgraphIds.push(subgraphId);
            subgraphString += '  subgraph ' + subgraphId + '[Rank ' + rankLabel + ']\\n';
            rankGroups[rank].forEach(function(argId) {
                subgraphString += '    ' + argId + '\\n';
            });
            subgraphString += '  end\\n';
        });

        if (subgraphIds.length > 0) {
            subgraphString += '  classDef ghost fill:transparent,stroke:none,color:transparent;\\n';
            subgraphString += '  class ' + subgraphIds.join(',') + ' ghost\\n';
        }

        return subgraphString;
    }

    function formatMultiLineLabel(key, argData, displayMode) {
        displayMode = displayMode || 'label-summary';
        var separator = "<hr style='border:0;border-top:1px dashed;margin:0;'/>";
        if (displayMode === 'label' || typeof argData === 'string') {
            return "<div style='display:flex;align-items:center;justify-content:center;padding:2px 10px;font-size:16px;white-space:nowrap;'>" + key + "</div>";
        }

        var formattedText = key + "<br>" + separator;

        if (argData && argData.summary) {
            formattedText += "<span style='padding:4px;'>" + argData.summary + "</span>";
        }

        if (displayMode === 'label-summary-details') {
            var details = argData && argData.details;
            if (details) {
                var formattedDetails = '';
                var isListFormat = false;

                if (typeof details === 'string') {
                    formattedDetails = details;
                } else if (Array.isArray(details)) {
                    details.forEach(function(item) {
                        isListFormat = true;
                        if (typeof item === 'string') {
                            formattedDetails += '<li>' + item + '</li>';
                        } else if (typeof item === 'object' && item !== null) {
                            Object.keys(item).forEach(function(key) {
                                if (item[key]) {
                                    formattedDetails += '<li><i>' + key + '</i>: ' + item[key] + '</li>';
                                } else {
                                    formattedDetails += '<li>' + key + '</li>';
                                }
                            });
                        }
                    });
                } else if (typeof details === 'object') {
                    isListFormat = true;
                    Object.keys(details).forEach(function(key) {
                        if (details[key]) {
                            formattedDetails += '<li><i>' + key + '</i>: ' + details[key] + '</li>';
                        } else {
                            formattedDetails += '<li>' + key + '</li>';
                        }
                    });
                }
                if (formattedDetails) {
                    if (isListFormat) {
                        formattedText += separator + '<ul style="margin:0; text-align:left;">' + formattedDetails + '</ul>';
                    } else {
                        formattedText += separator + formattedDetails;
                    }
                }
            }
        }
        return "<div style='min-width:150px;max-width:350px;word-wrap:break-word;'>" + formattedText + "</div>";
    }

    async function render() {
        var mermaidContainer = document.getElementById('mermaid-diagram')
        var wrapper = document.getElementById('wrapper');

        mermaidContainer.innerHTML = '';

        var graph = 'graph BT\\n';
        var themeColors = getThemeColors();
        graph += '  classDef default ' + themeColors['default'] + '\\n';
        graph += '  classDef add ' + themeColors.add + '\\n';
        graph += '  classDef select ' + themeColors.select + '\\n';
        graph += '  classDef selectadd ' + themeColors.selectadd + '\\n';

        graph += generateSubgraphs(currentStepIndex);

        var newNodes = currentStepIndex > 0 ? getNewArgumentsForStep(currentStepIndex) : [];
        var newNodeIds = new Set(newNodes.map(function(arg) { return Object.keys(arg)[0]; }));

        var defaultNodes='', addedNodes='', selectedNodes='', selectedAddNodes='';

        nodeData.forEach(function(node) {
            graph += '  ' + node.id + '["' + node.label + '"]\\n';

            if (colors[node.id] !== null) {
                if (newNodeIds.has(node.id)){
                    selectedAddNodes += selectedAddNodes ? ',' + node.id : node.id;
                } else {
                    selectedNodes += selectedNodes ? ',' + node.id : node.id;
                }
            } else if (newNodeIds.has(node.id)) {
                addedNodes += addedNodes ? ',' + node.id : node.id;
            } else {
                defaultNodes += defaultNodes ? ',' + node.id : node.id;
            }
        });

        if (defaultNodes) graph += '  class ' + defaultNodes + ' default\\n';
        if (addedNodes) graph += '  class ' + addedNodes + ' add\\n';
        if (selectedNodes) graph += '  class ' + selectedNodes + ' select\\n';
        if (selectedAddNodes) graph += '  class ' + selectedAddNodes + ' selectadd\\n';

        var filteredAttacks = getFilteredAttacks(currentStepIndex);
        filteredAttacks.forEach(function(attack) {
            var isNewAttack = newNodeIds.has(attack[0]) || newNodeIds.has(attack[1]);
            var arrowType = isNewAttack ? '==>' : '-->';
            graph += '    ' + attack[0] + ' ' + arrowType + ' ' + attack[1] + '\\n';
        });
        try {
            var result = await mermaid.render('diagram-id', graph);
            mermaidContainer.innerHTML = result.svg;

            if (!panzoomInstance) {
                initializePanzoom(wrapper, mermaidContainer);
            }
        } catch (error) {
            console.error('Error rendering mermaid diagram:', error);
        }
    }

                cb.addEventListener('change', function() {

                        if (currentSetFilter.indexOf(value) === -1) currentSetFilter.push(value);
                    } else {
                        var idx = currentSetFilter.indexOf(value);
                        if (idx !== -1) currentSetFilter.splice(idx, 1);

                    applySetFilter();
                });
                item.appendChild(cb);
                item.appendChild(document.createTextNode(label));

            var deselectAll = document.createElement('div');

            function updateSelectAllState() {
                var enabledCount = allCheckboxes.filter(function(cb) { return !cb.disabled; }).length;
                if (currentSetFilter.length >= enabledCount) {
                    selectAll.classList.add('disabled');

                if (currentSetFilter.length === 0) {
                    deselectAll.classList.add('disabled');

                    deselectAll.classList.remove('disabled');

            setBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                setList.classList.toggle('open');

            document.addEventListener('click', function(e) {
                if (!setWrap.contains(e.target)) {

    function toggleSection(sectionName) {
        var content = document.getElementById(sectionName + '-content');
        var toggle = document.getElementById(sectionName + '-toggle');
        var section = document.getElementById(sectionName + '-section');

        if (content.classList.contains('collapsed')) {
            content.classList.remove('collapsed');

            content.style.maxHeight = '';

            if (section) {
                var totalHeight = section.querySelector('.section-header').offsetHeight + content.scrollHeight;
                totalHeight = Math.min(totalHeight, windowHeight / 4);
                section.style.flex = '0 1 ' + totalHeight + 'px';
            }
            if (sectionName === 'exhibit') {
                setFileSpecificStorage('sessionExhibitHeight', 'expanded');
            } else if (sectionName === 'extensions') {
                setFileSpecificStorage('sessionExtensionsHeight', 'expanded');
            }
        } else {
            content.classList.add('collapsed');
            toggle.classList.add('collapsed');
            content.style.maxHeight = '0';
            if (section) {
                section.style.flex = '0 0 auto';
            }
            if (sectionName === 'exhibit') {
                setFileSpecificStorage('sessionExhibitHeight', 'collapsed');
            } else if (sectionName === 'extensions') {
                setFileSpecificStorage('sessionExtensionsHeight', 'collapsed');

                    setSpan.classList.add('selected');

    function setupResizeHandles() {
        var isResizing = false;
        var currentHandle = null;
        var startY = 0;
        var startExhibitHeight = 0;
        var startExtensionsHeight = 0;
        var startDecisionsHeight = 0;

        function startResize(e, handle) {
            isResizing = true;
            currentHandle = handle;
            startY = e.touches ? e.touches[0].clientY : e.clientY;

            startExhibitHeight = exhibitSection.getBoundingClientRect().height;
            startExtensionsHeight = extensionsSection.getBoundingClientRect().height;
            startDecisionsHeight = decisionsSection.getBoundingClientRect().height;

            document.body.style.cursor = 'row-resize';
            document.body.style.userSelect = 'none';

            e.preventDefault();
        }

        function doResize(e) {
            if (!isResizing || !currentHandle) return;

            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            var deltaY = clientY - startY;

            var exhibitHeader = exhibitSection.querySelector('.section-header');
            var extensionsHeader = extensionsSection.querySelector('.section-header');
            var exhibitMinHeight = exhibitHeader.getBoundingClientRect().height;
            var extensionsMinHeight = extensionsHeader.getBoundingClientRect().height;
            var graphMinHeight = 250;

            var collapseThreshold = 20;

            if (currentHandle === handle0) {
                var exhibitCollapsed = exhibitContent.classList.contains('collapsed');
                var targetExhibitHeight = startExhibitHeight + deltaY;

                if (!exhibitCollapsed) {
                    if (targetExhibitHeight <= exhibitMinHeight + collapseThreshold) {
                        toggleSection('exhibit');
                    } else {
                        var available0 = windowHeight - startExtensionsHeight - startDecisionsHeight;
                        var maxExhibitHeight0 = available0 - graphMinHeight;
                        var newExhibitHeight0 = Math.max(
                            exhibitMinHeight + collapseThreshold,
                            Math.min(maxExhibitHeight0, targetExhibitHeight)
                        );

                        exhibitSection.style.flex = '0 0 ' + newExhibitHeight0 + 'px';
                        graphSection.style.flex = '1 1 0';
                        extensionsSection.style.flex = '0 0 ' + startExtensionsHeight + 'px';

                        setFileSpecificStorage('sessionExhibitHeight', newExhibitHeight0.toString());
                        setFileSpecificStorage('sessionExtensionsHeight', startExtensionsHeight.toString());
                    }
                } else {
                    if (targetExhibitHeight > exhibitMinHeight + collapseThreshold) {
                        toggleSection('exhibit');
                    }
                }

            } else if (currentHandle === handle1) {
                var decisionsVisible1 = window.getComputedStyle(decisionsSection).display !== 'none';

                if (decisionsVisible1) {
                    // Decisions is visible — resize decisions; exhibit stays pinned
                    var decisionsCollapsed1 = decisionsContent.classList.contains('collapsed');
                    var decisionsHeader1 = decisionsSection.querySelector('.section-header');
                    var decisionsMinHeight1 = decisionsHeader1.getBoundingClientRect().height;
                    var targetDecisionsHeight = startDecisionsHeight + deltaY;

                    if (!decisionsCollapsed1) {
                        if (targetDecisionsHeight <= decisionsMinHeight1 + collapseThreshold) {
                            toggleSection('decisions');
                        } else {
                            var availableForDecisionsAndGraph = windowHeight - startExtensionsHeight - startExhibitHeight;
                            var maxDecisionsHeight = availableForDecisionsAndGraph - graphMinHeight;
                            var newDecisionsHeight = Math.max(
                                decisionsMinHeight1 + collapseThreshold,
                                Math.min(maxDecisionsHeight, targetDecisionsHeight)
                            );
                            if (window.getComputedStyle(exhibitSection).display !== 'none') {
                                exhibitSection.style.flex = '0 0 ' + startExhibitHeight + 'px';
                            }
                            decisionsSection.style.flex = '0 0 ' + newDecisionsHeight + 'px';
                            graphSection.style.flex = '1 1 0';
                            extensionsSection.style.flex = '0 0 ' + startExtensionsHeight + 'px';
                        }
                    } else {
                        if (targetDecisionsHeight > decisionsMinHeight1 + collapseThreshold) {
                            toggleSection('decisions');
                        }
                    }
                } else {
                    // Decisions hidden — handle1 acts as exhibit↔graph boundary
                    var exhibitCollapsed1 = exhibitContent.classList.contains('collapsed');
                    var targetExhibitHeight1 = startExhibitHeight + deltaY;

                    if (!exhibitCollapsed1) {
                        if (targetExhibitHeight1 <= exhibitMinHeight + collapseThreshold) {
                            toggleSection('exhibit');
                        } else {
                            var available1 = windowHeight - startExtensionsHeight;
                            var maxExhibitHeight1 = available1 - graphMinHeight;
                            var newExhibitHeight1 = Math.max(
                                exhibitMinHeight + collapseThreshold,
                                Math.min(maxExhibitHeight1, targetExhibitHeight1)
                            );
                            exhibitSection.style.flex = '0 0 ' + newExhibitHeight1 + 'px';
                            graphSection.style.flex = '1 1 0';
                            extensionsSection.style.flex = '0 0 ' + startExtensionsHeight + 'px';
                            setFileSpecificStorage('sessionExhibitHeight', newExhibitHeight1.toString());
                            setFileSpecificStorage('sessionExtensionsHeight', startExtensionsHeight.toString());
                        }
                    } else {
                        if (targetExhibitHeight1 > exhibitMinHeight + collapseThreshold) {
                            toggleSection('exhibit');
                        }
                    }
                }

            } else if (currentHandle === handle2) {
                var extensionsCollapsed = extensionsContent.classList.contains('collapsed');

                var targetExtensionsHeight = startExtensionsHeight - deltaY;

                if (!extensionsCollapsed) {
                    if (targetExtensionsHeight <= extensionsMinHeight + collapseThreshold) {
                        toggleSection('extensions');
                    } else {
                        var availableForGraphAndExtensions = windowHeight - startExhibitHeight - startDecisionsHeight;

                        var maxExtensionsHeight = availableForGraphAndExtensions - graphMinHeight;
                        var newExtensionsHeight = Math.max(
                            extensionsMinHeight + collapseThreshold,
                            Math.min(maxExtensionsHeight, targetExtensionsHeight)
                        );

                        exhibitSection.style.flex = '0 0 ' + startExhibitHeight + 'px';
                        graphSection.style.flex = '1 1 0';
                        extensionsSection.style.flex = '0 0 ' + newExtensionsHeight + 'px';

                        setFileSpecificStorage('sessionExhibitHeight', startExhibitHeight.toString());
                        setFileSpecificStorage('sessionExtensionsHeight', newExtensionsHeight.toString());
                    }
                } else {
                    if (targetExtensionsHeight > extensionsMinHeight + collapseThreshold) {
                        toggleSection('extensions');
                    }
                }
            }

            setTimeout(reinitPanzoom, 50);
        }

        function stopResize() {
            if (!isResizing) return;

            isResizing = false;
            currentHandle = null;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        }

        handle0.addEventListener('mousedown', function(e) { startResize(e, handle0); });
        handle1.addEventListener('mousedown', function(e) { startResize(e, handle1); });
        handle2.addEventListener('mousedown', function(e) { startResize(e, handle2); });
        handle0.addEventListener('touchstart', function(e) { startResize(e, handle0); }, { passive: false });
        handle1.addEventListener('touchstart', function(e) { startResize(e, handle1); }, { passive: false });
        handle2.addEventListener('touchstart', function(e) { startResize(e, handle2); }, { passive: false });

        document.addEventListener('mousemove', doResize);
        document.addEventListener('mouseup', stopResize);
        document.addEventListener('touchmove', doResize, { passive: false });
        document.addEventListener('touchend', stopResize);

        document.addEventListener('selectstart', function(e) {
            if (isResizing) e.preventDefault();
        });
    }

    function updateDecisionsDisplay() {
        var decisionsList = document.getElementById('decisions-list');
        if (!decisionsList) return;

        var decisions = argumentationData.decisions;
        if (!decisions || typeof decisions !== 'object' || Array.isArray(decisions) || Object.keys(decisions).length === 0) {
            decisionsSection.style.display = 'none';
            updateResizeHandleVisibility();
            return;
        }

        decisionsSection.style.display = 'flex';
        decisionsList.innerHTML = '';

        var extensions = getExtensionsForStep(currentStepIndex);

        Object.keys(decisions).forEach(function(question) {
            var dec = decisions[question] || {};
            var semanticsType = dec.semantics !== undefined ? dec.semantics : 'preferred';
            var criterion = dec.criterion !== undefined ? String(dec.criterion) : null;
            var quantifier = dec.quantifier !== undefined ? dec.quantifier : 'at least one';

            if (criterion === null) return;

            var extList = extensions[semanticsType] || [];
            var answer;
            if (quantifier === 'at least one') {
                answer = extList.some(function(ext) { return ext.indexOf(criterion) !== -1; });
            } else if (quantifier === 'all') {
                answer = extList.length > 0 && extList.every(function(ext) { return ext.indexOf(criterion) !== -1; });
            } else {
                answer = extList.every(function(ext) { return ext.indexOf(criterion) === -1; });
            }

            var itemDiv = document.createElement('div');
            itemDiv.className = 'decision-item';

            var questionSpan = document.createElement('span');
            questionSpan.className = 'decision-question';
            questionSpan.textContent = question;

            var semanticsDisplay = semanticsType.replace(/_/g, ' ');
            var answerSpan = document.createElement('span');
            answerSpan.className = 'decision-answer ' + (answer ? 'yes' : 'no');
            var v = function(t) { return '<span class="decision-value">' + t + '</span>'; };
            var phrase;
            if (quantifier === 'at least one') {
                phrase = v('at least one') + ' ' + v(semanticsDisplay) + ' extension';
            } else if (quantifier === 'all') {
                phrase = v('all') + ' ' + v(semanticsDisplay) + ' extensions';
            } else if (quantifier === 'none') {
                phrase = v('none') + ' of the ' + v(semanticsDisplay) + ' extensions';
            } else {
                phrase = v(quantifier) + ' ' + v(semanticsDisplay) + ' extensions';
            }
            answerSpan.innerHTML = (answer ? 'Yes' : 'No')
                + ', it is ' + (answer ? '' : 'not ') + 'the case that the criterion '
                + v(criterion) + ' holds in ' + phrase + '.';

            itemDiv.appendChild(questionSpan);
            itemDiv.appendChild(answerSpan);
            decisionsList.appendChild(itemDiv);
        });

        updateResizeHandleVisibility();
    }

    var windowHeight = document.body.getBoundingClientRect().height - 50;
    var handle0 = document.getElementById('resize-handle-0');
    var handle1 = document.getElementById('resize-handle-1');
    var handle2 = document.getElementById('resize-handle-2');
    var exhibitSection = document.getElementById('exhibit-section');

        var displayControls = document.getElementById('argument-display-mode').parentElement;

        function isWrapping() {
            var refRect = stepNav.getBoundingClientRect();
            var refMid = (refRect.top + refRect.bottom) / 2;
            return [themeControls, rankControls, displayControls, setFilterControls].some(function(el) {
                if (el.style.display === 'none') return false;
                var rect = el.getBoundingClientRect();
                return Math.abs((rect.top + rect.bottom) / 2 - refMid) > 5;
            });
        }

        function updateVisibility() {
            themeControls.style.display = '';
            rankControls.style.display = '';
            displayControls.style.display = '';
            if (!isWrapping()) return;
            themeControls.style.display = 'none';
            if (!isWrapping()) return;
            rankControls.style.display = 'none';
            if (!isWrapping()) return;
            displayControls.style.display = 'none';
        }

<script>
    const argumentationData = ${af4graph};

    let panzoomInstance = null;
    let savedZoomLevel = null;

    // =====================================================================
    //  Main playground logic
    // =====================================================================

    function runVisualization(yamlText) {
        var errorBar = document.getElementById('error-bar');
        var previewFrame = document.getElementById('preview-frame');

        try {
            var yamlData = jsyaml.load(yamlText);

            var validationError = validateYaml(yamlData);
            if (validationError) {
                errorBar.textContent = validationError;
                errorBar.style.display = 'block';
                return;
            }

            var jsonData = preprocessAndCompute(yamlData);
            var af4graph = JSON.stringify(jsonData);
            var exhibit = extractRawExhibit(yamlText) || '[Not provided]';
            var html = generateReportHtml(af4graph, exhibit, 'playground');

            errorBar.style.display = 'none';
            previewFrame.srcdoc = html;

        } catch (e) {
            errorBar.textContent = 'Error: ' + e.message;
            errorBar.style.display = 'block';
        }
    }

    // --- CodeMirror editor ---
    var editor = window._editor = CodeMirror(document.getElementById('editor-container'), {
        value: EXAMPLES.friedchicken_step,
        mode: 'yaml',
        lineNumbers: true,
        tabSize: 2,
        indentWithTabs: false,
        lineWrapping: true,
        extraKeys: {
            'Enter': function(cm) {
                var cur = cm.getCursor();
                if (cur.ch === 0 && !cm.somethingSelected()) {
                    cm.replaceSelection('\n');
                    return;
                }
                return CodeMirror.Pass;
            },
            'Tab': function(cm) {
                if (cm.somethingSelected()) {
                    cm.indentSelection('add');
                } else {
                    cm.replaceSelection('  ', 'end');
                }
            },
            'Shift-Tab': function(cm) {
                cm.indentSelection('subtract');
            },
            'Cmd-S': function(cm) {
                runVisualization(cm.getValue());
            },
            'Ctrl-S': function(cm) {
                runVisualization(cm.getValue());
            },
            'Cmd-/': function(cm) {
                var ranges = cm.listSelections();
                cm.operation(function() {
                    ranges.forEach(function(range) {
                        var fromLine = range.from().line;
                        var toLine = range.to().line;
                        if (range.to().ch === 0 && toLine > fromLine) toLine--;
                        var allCommented = true;
                        for (var i = fromLine; i <= toLine; i++) {
                            if (!/^#/.test(cm.getLine(i))) { allCommented = false; break; }
                        }
                        for (var i = fromLine; i <= toLine; i++) {
                            if (allCommented) {
                                cm.replaceRange('', {line: i, ch: 0}, {line: i, ch: 1});
                            } else {
                                cm.replaceRange('#', {line: i, ch: 0});
                            }
                        }
                    });
                });
            },
            'Ctrl-/': function(cm) {
                var ranges = cm.listSelections();
                cm.operation(function() {
                    ranges.forEach(function(range) {
                        var fromLine = range.from().line;
                        var toLine = range.to().line;
                        if (range.to().ch === 0 && toLine > fromLine) toLine--;
                        var allCommented = true;
                        for (var i = fromLine; i <= toLine; i++) {
                            if (!/^#/.test(cm.getLine(i))) { allCommented = false; break; }
                        }
                        for (var i = fromLine; i <= toLine; i++) {
                            if (allCommented) {
                                cm.replaceRange('', {line: i, ch: 0}, {line: i, ch: 1});
                            } else {
                                cm.replaceRange('#', {line: i, ch: 0});
                            }
                        }
                    });
                });
            }
        }
    });

    // --- Run button ---
    document.getElementById('runBtn').addEventListener('click', function() {
        runVisualization(editor.getValue());
        // On mobile, switch to preview after running
        if (window.matchMedia('(max-width: 768px)').matches) {
            switchTab('preview');
        }
    });

    // --- Share button ---
    var SHARE_URL_MAX = 8192;
    document.getElementById('shareBtn').addEventListener('click', function() {
        var yaml = editor.getValue();
        var compressed = LZString.compressToEncodedURIComponent(yaml);
        var url = window.location.href.split('#')[0] + '#yaml=' + compressed;
        var btn = document.getElementById('shareBtn');
        var errorBar = document.getElementById('error-bar');

        if (url.length > SHARE_URL_MAX) {
            btn.textContent = 'Too long!';
            btn.style.background = '#fee2e2';
            btn.style.color = '#dc2626';
            btn.style.borderColor = '#fca5a5';
            errorBar.textContent = 'YAML too long to share (' + url.length + ' / ' + SHARE_URL_MAX + ' chars). Shorten your YAML and try again.';
            errorBar.style.display = 'block';
            setTimeout(function() {
                btn.textContent = 'Share';
                btn.style.background = '';
                btn.style.color = '';
                btn.style.borderColor = '';
            }, 3000);
            return;
        }

        errorBar.style.display = 'none';
        navigator.clipboard.writeText(url).then(function() {
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Share'; }, 1500);
        });
    });

    // --- Ctrl+S / Cmd+S global shortcut (when editor not focused) ---
    window.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
            e.preventDefault();
            runVisualization(editor.getValue());
        }
    }, true);

    // --- Mobile tab switching ---
    function switchTab(tab) {
        var editorPanel = document.getElementById('editor-panel');
        var previewPanel = document.getElementById('preview-panel');
        var tabYaml = document.getElementById('tab-yaml');
        var tabPreview = document.getElementById('tab-preview');
        if (tab === 'yaml') {
            editorPanel.classList.add('mobile-active');
            previewPanel.style.display = 'none';
            tabYaml.classList.add('active');
            tabPreview.classList.remove('active');
            if (window._editor) window._editor.refresh();
        } else {
            editorPanel.classList.remove('mobile-active');
            previewPanel.style.display = '';
            tabYaml.classList.remove('active');
            tabPreview.classList.add('active');
        }
    }

    // On mobile, default to preview tab (editor hidden, preview visible)
    (function() {
        if (window.matchMedia('(max-width: 768px)').matches) {
            document.getElementById('preview-panel').style.display = '';
        }
    })();

    // --- Example dropdown ---
    document.getElementById('example-select').addEventListener('change', function(e) {
        var content = EXAMPLES[e.target.value];
        if (content) {
            editor.setValue(content);
            runVisualization(content);
        }
    });

    // --- Install button ---
    document.getElementById('installBtn').addEventListener('click', function() {
        window.open('https://marketplace.visualstudio.com/items?itemName=CIRSS.argblazer', '_blank');
    });

    // --- Hide example select when panel too narrow ---
    (function() {
        var exampleSelect = document.getElementById('example-select');
        var editorPanel = document.getElementById('editor-panel');
        new ResizeObserver(function(entries) {
            var width = entries[0].contentRect.width;
            exampleSelect.style.display = width < 320 ? 'none' : '';
        }).observe(editorPanel);
    })();

    // --- Divider dragging ---
    (function() {
        var divider = document.getElementById('divider');
        var editorPanel = document.getElementById('editor-panel');
        var workspace = document.getElementById('workspace');
        var isVertical = window.matchMedia('(max-width: 768px)').matches;
        var isDragging = false;

        var previewFrame = document.getElementById('preview-frame');

        function startDrag(e) {
            isDragging = true;
            isVertical = window.matchMedia('(max-width: 768px)').matches;
            divider.classList.add('active');
            document.body.style.cursor = isVertical ? 'row-resize' : 'col-resize';
            document.body.style.userSelect = 'none';
            previewFrame.style.pointerEvents = 'none';
            e.preventDefault();
        }

        function doDrag(clientX, clientY) {
            var rect = workspace.getBoundingClientRect();
            if (isVertical) {
                var newHeight = clientY - rect.top;
                var minH = 100, maxH = rect.height - 100;
                newHeight = Math.max(minH, Math.min(maxH, newHeight));
                editorPanel.style.height = newHeight + 'px';
            } else {
                var newWidth = clientX - rect.left;
                var minW = 220, maxW = rect.width - 220;
                newWidth = Math.max(minW, Math.min(maxW, newWidth));
                editorPanel.style.width = newWidth + 'px';
            }
        }

        function endDrag() {
            if (isDragging) {
                isDragging = false;
                divider.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                previewFrame.style.pointerEvents = '';
            }
        }

        divider.addEventListener('mousedown', startDrag);
        divider.addEventListener('touchstart', function(e) { startDrag(e); }, { passive: false });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            doDrag(e.clientX, e.clientY);
        });
        document.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            doDrag(e.touches[0].clientX, e.touches[0].clientY);
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    })();

    // --- Load from shared URL or run default ---
    (function() {
        var hash = window.location.hash;
        if (hash && hash.indexOf('#yaml=') === 0) {
            var compressed = hash.substring(6);
            try {
                var yaml = LZString.decompressFromEncodedURIComponent(compressed);
                if (yaml) {
                    editor.setValue(yaml);
                    runVisualization(yaml);
                    return;
                }
            } catch (e) {
                console.error('Failed to load shared YAML:', e);
            }
        }
        if (hash && hash.indexOf('#example=') === 0) {
            var key = hash.substring(9);
            if (EXAMPLES[key]) {
                document.getElementById('example-select').value = key;
                editor.setValue(EXAMPLES[key]);
                runVisualization(EXAMPLES[key]);
                return;
            }
        }
        runVisualization(EXAMPLES.friedchicken_step);
    })();
    </script>
